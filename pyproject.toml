[tool.poetry]
name = "sps"
version = "0.1.0"
description = "Stochastic Process Simulators"
authors = ["Daniel Jenson <daniel.a.jenson@gmail.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"
beartype = "^0.17.0"
jaxlib = {version = "0.4.23+cuda12.cudnn89", extras = ["cuda12_pip"], source = "jax-cuda-12"}
jaxtyping = "^0.2.25"
jax = {version = "0.4.23"}

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.4"

[[tool.poetry.source]]
name = "jax-cuda-12"
url = "https://storage.googleapis.com/jax-releases/jax_cuda_releases.html"
priority = "explicit"

[[tool.poetry.source]]
name = "PyPI"
priority = "default"

[tool.pytest.ini_options]
addopts = "--jaxtyping-packages=sp_sim,beartype.beartype"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
